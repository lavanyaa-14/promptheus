<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AriaCorp Support</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 700px;
      height: 600px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: #0066cc;
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
    }

    .header-info h3 { font-size: 15px; font-weight: 600; }
    .header-info p  { font-size: 12px; opacity: 0.8; }

    .online-dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-left: auto;
    }

    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.user {
      background: #0066cc;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.aria {
      background: #f0f2f5;
      color: #1a1a1a;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.system-msg {
      background: #fff3cd;
      color: #856404;
      align-self: center;
      font-size: 12px;
      border-radius: 8px;
      max-width: 90%;
    }

    .chat-input {
      padding: 16px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 8px;
    }

    .mode-toggle {
      padding: 4px 8px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      gap: 8px;
      background: #f9fafb;
      font-size: 12px;
      align-items: center;
    }

    .mode-toggle span { color: #6b7280; }

    .mode-btn {
      padding: 4px 10px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      font-size: 12px;
      color: #374151;
    }

    .mode-btn.active {
      background: #0066cc;
      color: white;
      border-color: #0066cc;
    }

    #input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    #input:focus { border-color: #0066cc; }

    #send-btn {
      padding: 10px 18px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }

    #send-btn:hover { background: #0052a3; }
    #send-btn:disabled { background: #93c5fd; cursor: not-allowed; }

    .typing {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 10px 14px;
    }

    .typing span {
      width: 6px;
      height: 6px;
      background: #9ca3af;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-6px); }
    }
  </style>
</head>
<body>
  <div class="chat-container">

    <div class="chat-header">
      <div class="avatar">A</div>
      <div class="header-info">
        <h3>Aria — AriaCorp Support</h3>
        <p>Typically replies instantly</p>
      </div>
      <div class="online-dot"></div>
    </div>

    <!-- Mode toggle: switch between /chat and /agent endpoints -->
    <div class="mode-toggle">
      <span>Mode:</span>
      <button class="mode-btn active" id="btn-chat"
              onclick="setMode('chat')">Chat</button>
      <button class="mode-btn" id="btn-agent"
              onclick="setMode('agent')">Agent</button>
    </div>

    <div id="chat-box">
      <div class="message aria">
        Hi! I'm Aria, AriaCorp's support assistant.
        How can I help you today?
      </div>
    </div>

    <div class="chat-input">
      <input id="input" type="text"
             placeholder="Type your message..."
             autocomplete="off"/>
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>

  </div>

  <script>
    let currentMode = 'chat';

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('btn-chat').classList.toggle('active', mode === 'chat');
      document.getElementById('btn-agent').classList.toggle('active', mode === 'agent');

      const label = mode === 'agent'
        ? '⚠️ Agent mode — tool calls enabled (email, file read)'
        : 'Switched to chat mode';
      appendMessage(label, 'system-msg');
    }

    function appendMessage(text, className) {
      const chatBox = document.getElementById('chat-box');
      const div = document.createElement('div');
      div.className = `message ${className}`;

      if (className === 'aria') {
        // ============================================================
        // VULN-05 (LLM02): innerHTML used instead of textContent.
        // If the model outputs <script> or <img onerror=...>,
        // the browser executes it directly — stored XSS.
        // Fix would be: div.textContent = text
        // ============================================================
        div.innerHTML = text;
      } else {
        div.textContent = text;
      }

      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTyping() {
      const chatBox = document.getElementById('chat-box');
      const div = document.createElement('div');
      div.className = 'message aria typing';
      div.id = 'typing-indicator';
      div.innerHTML = '<span></span><span></span><span></span>';
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing-indicator');
      if (t) t.remove();
    }

    async function sendMessage() {
      const input = document.getElementById('input');
      const btn   = document.getElementById('send-btn');
      const message = input.value.trim();
      if (!message) return;

      // User message is safely escaped via textContent
      appendMessage(message, 'user');
      input.value = '';
      btn.disabled = true;
      showTyping();

      try {
        const endpoint = currentMode === 'agent' ? '/agent' : '/chat';
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });

        const data = await res.json();
        removeTyping();

        // Show Aria's reply (vulnerable innerHTML for /chat)
        appendMessage(data.reply, 'aria');

        // If agent mode, show what tools were called
        if (data.tool_calls && data.tool_calls.length > 0) {
          data.tool_calls.forEach(tc => {
            const summary = `Tool called: ${tc.tool} → ${JSON.stringify(tc.args)}`;
            appendMessage(summary, 'system-msg');
          });
        }

      } catch (err) {
        removeTyping();
        appendMessage('Error: could not reach Aria. Is the server running?', 'system-msg');
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    // Send on Enter key
    document.getElementById('input').addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
